<!-- partials/alerts.html -->

{% with messages = get_flashed_messages(with_categories=True) %}

  {% if messages %}

    <div class="mb-6 space-y-3">

      {% for category, message in messages %}

        <div class="flex items-start gap-3 px-5 py-4 rounded-2xl border shadow-sm backdrop-blur-sm text-sm font-medium

          {% if category == 'success' %}
            bg-green-50 border-green-200 text-green-800

          {% elif category == 'danger' %}
            bg-red-50 border-red-200 text-red-800

          {% elif category == 'warning' %}
            bg-yellow-50 border-yellow-200 text-yellow-800

          {% else %}
            bg-violet-50 border-violet-200 text-violet-800

          {% endif %}">

          <!-- ICON -->
          <span class="flex-shrink-0 mt-0.5">

            {% if category == 'success' %}

              <svg xmlns="http://www.w3.org/2000/svg"
                   class="w-5 h-5"
                   fill="none"
                   viewBox="0 0 24 24"
                   stroke="currentColor"
                   stroke-width="2">

                <path stroke-linecap="round"
                      stroke-linejoin="round"
                      d="M5 13l4 4L19 7" />

              </svg>

            {% elif category == 'danger' %}

              <svg xmlns="http://www.w3.org/2000/svg"
                   class="w-5 h-5"
                   fill="none"
                   viewBox="0 0 24 24"
                   stroke="currentColor"
                   stroke-width="2">

                <path stroke-linecap="round"
                      stroke-linejoin="round"
                      d="M6 18L18 6M6 6l12 12" />

              </svg>

            {% elif category == 'warning' %}

              <svg xmlns="http://www.w3.org/2000/svg"
                   class="w-5 h-5"
                   fill="none"
                   viewBox="0 0 24 24"
                   stroke="currentColor"
                   stroke-width="2">

                <path stroke-linecap="round"
                      stroke-linejoin="round"
                      d="M12 9v2m0 4h.01M10.29 3.86l-7.5 13A1 1 0 003.66 18h16.68a1 1 0 00.87-1.5l-7.5-13a1 1 0 00-1.74 0z" />

              </svg>

            {% else %}

              <svg xmlns="http://www.w3.org/2000/svg"
                   class="w-5 h-5"
                   fill="none"
                   viewBox="0 0 24 24"
                   stroke="currentColor"
                   stroke-width="2">

                <path stroke-linecap="round"
                      stroke-linejoin="round"
                      d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />

              </svg>

            {% endif %}

          </span>

          <!-- MESSAGE -->
          <span class="leading-relaxed">
            {{ message }}
          </span>

        </div>

      {% endfor %}

    </div>

  {% endif %}

{% endwith %}
