<!-- partials/public_navbar.html -->
<!-- Reusable navbar for the public FaithVerse website. -->
<!-- Included in layouts/base_public.html via {% include %}. -->
<!-- DO NOT extend or use block tags here — it's a plain partial. -->

<nav class="public-nav" role="navigation" aria-label="Main navigation">
  <div class="nav-container">

    <!-- ============================================================
         LOGO
         url_for('public.index') → links to the public homepage.
         ============================================================ -->
    <a href="{{ url_for('public.index') }}" class="nav-logo" aria-label="FaithVerse Home">
      <div class="logo-icon">
        <!-- Cross icon — SVG, no external image needed -->
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none"
             stroke="currentColor" stroke-width="2.5"
             stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 2v20M2 12h20" />
        </svg>
      </div>
      FaithVerse
    </a>

    <!-- ============================================================
         DESKTOP NAV LINKS
         Hidden on mobile (< 768px) via CSS.
         ============================================================ -->
    <ul class="nav-links" role="list">
      <li>
        <a href="{{ url_for('public.index') }}"
           class="{{ 'active' if request.endpoint == 'public.index' else '' }}">
          Home
        </a>
      </li>
      <li>
        <a href="{{ url_for('public.about') }}"
           class="{{ 'active' if request.endpoint == 'public.about' else '' }}">
          About
        </a>
      </li>
      <li>
        <a href="{{ url_for('public.prayer_wall') }}"
           class="{{ 'active' if request.endpoint == 'public.prayer_wall' else '' }}">
          Prayer Wall
        </a>
      </li>
      <li>
        <a href="{{ url_for('public.contact') }}"
           class="{{ 'active' if request.endpoint == 'public.contact' else '' }}">
          Contact
        </a>
      </li>
      <li>
        <!-- CTA button — styled differently from regular links -->
        <a href="{{ url_for('public.prayer_wall') }}#submit" class="nav-cta">
          Submit Prayer
        </a>
      </li>
    </ul>

    <!-- ============================================================
         HAMBURGER BUTTON
         Visible only on mobile. Calls toggleMobileMenu() from public.js.
         aria-expanded is updated by JS for accessibility.
         ============================================================ -->
    <button class="nav-hamburger"
            id="nav-hamburger"
            onclick="toggleMobileMenu()"
            aria-label="Toggle navigation menu"
            aria-expanded="false"
            aria-controls="mobile-menu"
            type="button">
      <!-- Three lines = hamburger icon -->
      <span></span>
      <span></span>
      <span></span>
    </button>

  </div>
</nav>

<!-- ================================================================
     MOBILE MENU DRAWER
     Hidden by default. CSS class 'open' makes it visible.
     The .mobile-menu CSS rule is in public.css.
     ================================================================ -->
<div class="mobile-menu"
     id="mobile-menu"
     role="dialog"
     aria-label="Mobile navigation menu"
     aria-hidden="true">

  <a href="{{ url_for('public.index') }}"
     class="{{ 'active' if request.endpoint == 'public.index' else '' }}">
    Home
  </a>
  <a href="{{ url_for('public.about') }}"
     class="{{ 'active' if request.endpoint == 'public.about' else '' }}">
    About
  </a>
  <a href="{{ url_for('public.prayer_wall') }}"
     class="{{ 'active' if request.endpoint == 'public.prayer_wall' else '' }}">
    Prayer Wall
  </a>
  <a href="{{ url_for('public.contact') }}"
     class="{{ 'active' if request.endpoint == 'public.contact' else '' }}">
    Contact
  </a>

  <!-- CTA in mobile menu -->
  <a href="{{ url_for('public.prayer_wall') }}#submit"
     style="color: var(--violet-700); font-weight: 700; border-top: 2px solid var(--violet-100); padding-top: 0.75rem; margin-top: 0.25rem;">
    ✦ Submit a Prayer Request
  </a>
</div>
