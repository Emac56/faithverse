<!-- partials/navbar.html -->
<!-- Top navigation bar — included in base.html -->

<header class="bg-white shadow-sm border-b border-gray-200 h-16 flex items-center px-4 lg:px-6">

  <!-- LEFT SIDE — Mobile menu button + Page title -->
  <div class="flex items-center gap-4">

    <!-- MOBILE HAMBURGER BUTTON -->
    <!-- Only visible on small screens (lg:hidden) -->
    <button onclick="toggleSidebar()"
            class="lg:hidden p-2 rounded-lg text-gray-500 hover:bg-gray-100 transition">
      <!-- Hamburger icon (3 lines) using Unicode -->
      <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M4 6h16M4 12h16M4 18h16"/>
      </svg>
    </button>

    <!-- PAGE TITLE -->
    <!--
      block navbar_title lets each page set its own title in the navbar.
      Default is "Dashboard" if the page doesn't override it.
    -->
    <h1 class="text-lg font-semibold text-gray-800">
      {% block navbar_title %}Dashboard{% endblock %}
    </h1>

  </div>

  <!-- RIGHT SIDE — Admin info -->
  <div class="ml-auto flex items-center gap-3">

    <!-- ADMIN ROLE BADGE -->
    <span class="hidden sm:inline-flex items-center px-2.5 py-0.5 rounded-full
                 text-xs font-medium bg-blue-100 text-blue-800">
      {{ current_user.role | upper }}
    </span>

    <!-- ADMIN USERNAME -->
    <span class="text-sm text-gray-700 font-medium">
      {{ current_user.username }}
    </span>

    <!-- LOGOUT BUTTON (desktop) -->
    <a href="{{ url_for('auth.logout') }}"
       class="hidden sm:inline-flex items-center px-3 py-1.5 rounded-lg
              text-sm text-red-600 hover:bg-red-50 border border-red-200
              transition-colors">
      Logout
    </a>

  </div>

</header>
