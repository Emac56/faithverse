<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login — FaithVerse</title>
  <!-- Tailwind CSS CDN — no install needed -->
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-gradient-to-br from-blue-50 to-indigo-100 flex items-center justify-center px-4">

  <div class="w-full max-w-md">

    <!-- Card -->
    <div class="bg-white rounded-2xl shadow-lg p-8">

      <!-- Logo / Heading -->
      <div class="text-center mb-8">
        <div class="text-4xl mb-2">🕌</div>
        <h1 class="text-2xl font-bold text-gray-800">FaithVerse</h1>
        <p class="text-gray-500 text-sm mt-1">Sign in to your account</p>
      </div>

      <!-- Flash Messages -->
      <!--
        get_flashed_messages(with_categories=True) returns a list of
        (category, message) tuples. Categories: 'success', 'danger', 'info'.
        We use them to style the alert differently.
      -->
      {% with messages = get_flashed_messages(with_categories=True) %}
        {% if messages %}
          {% for category, message in messages %}
            <div class="mb-4 px-4 py-3 rounded-lg text-sm
              {% if category == 'danger' %} bg-red-50 text-red-700 border border-red-200
              {% elif category == 'success' %} bg-green-50 text-green-700 border border-green-200
              {% else %} bg-blue-50 text-blue-700 border border-blue-200
              {% endif %}">
              {{ message }}
            </div>
          {% endfor %}
        {% endif %}
      {% endwith %}

      <!-- Login Form -->
      <!--
        action="" means submit to the same URL (POST /auth/login).
        method="post" sends form data in the request body (not the URL).
      -->
      <form action="" method="post" class="space-y-5">

        <!-- Username or Email -->
        <div>
          <label for="identifier" class="block text-sm font-medium text-gray-700 mb-1">
            Username or Email
          </label>
          <input
            type="text"
            id="identifier"
            name="identifier"
            placeholder="Enter your username or email"
            required
            class="w-full px-4 py-2.5 border border-gray-300 rounded-lg text-sm
                   focus:outline-none focus:ring-2 focus:ring-indigo-400 focus:border-transparent
                   transition"
          />
        </div>

        <!-- Password -->
        <div>
          <label for="password" class="block text-sm font-medium text-gray-700 mb-1">
            Password
          </label>
          <input
            type="password"
            id="password"
            name="password"
            placeholder="Enter your password"
            required
            class="w-full px-4 py-2.5 border border-gray-300 rounded-lg text-sm
                   focus:outline-none focus:ring-2 focus:ring-indigo-400 focus:border-transparent
                   transition"
          />
        </div>

        <!-- Remember Me -->
        <div class="flex items-center gap-2">
          <!--
            name="remember" — if checked, form sends remember=on.
            The controller checks: request.form.get('remember') == 'on'
          -->
          <input
            type="checkbox"
            id="remember"
            name="remember"
            class="w-4 h-4 text-indigo-600 border-gray-300 rounded"
          />
          <label for="remember" class="text-sm text-gray-600">
            Remember me for 30 days
          </label>
        </div>

        <!-- Submit Button -->
        <button
          type="submit"
          class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-semibold
                 py-2.5 rounded-lg text-sm transition duration-200"
        >
          Sign In
        </button>

      </form>

      <!-- Register Link -->
      <p class="text-center text-sm text-gray-500 mt-6">
        Don't have an account?
        <a href="{{ url_for('auth.register') }}" class="text-indigo-600 hover:underline font-medium">
          Create one
        </a>
      </p>

    </div>
  </div>

</body>
</html>
