<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Register — FaithVerse</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-gradient-to-br from-blue-50 to-indigo-100 flex items-center justify-center px-4 py-8">

  <div class="w-full max-w-md">

    <div class="bg-white rounded-2xl shadow-lg p-8">

      <!-- Heading -->
      <div class="text-center mb-8">
        <div class="text-4xl mb-2">🕌</div>
        <h1 class="text-2xl font-bold text-gray-800">Create Account</h1>
        <p class="text-gray-500 text-sm mt-1">Join FaithVerse today</p>
      </div>

      <!-- Flash Messages -->
      {% with messages = get_flashed_messages(with_categories=True) %}
        {% if messages %}
          {% for category, message in messages %}
            <div class="mb-4 px-4 py-3 rounded-lg text-sm
              {% if category == 'danger' %} bg-red-50 text-red-700 border border-red-200
              {% elif category == 'success' %} bg-green-50 text-green-700 border border-green-200
              {% else %} bg-blue-50 text-blue-700 border border-blue-200
              {% endif %}">
              {{ message }}
            </div>
          {% endfor %}
        {% endif %}
      {% endwith %}

      <!-- Register Form -->
      <form action="" method="post" class="space-y-5">

        <!-- Username -->
        <div>
          <label for="username" class="block text-sm font-medium text-gray-700 mb-1">
            Username
          </label>
          <input
            type="text"
            id="username"
            name="username"
            placeholder="Choose a username"
            required
            minlength="3"
            maxlength="80"
            class="w-full px-4 py-2.5 border border-gray-300 rounded-lg text-sm
                   focus:outline-none focus:ring-2 focus:ring-indigo-400 focus:border-transparent
                   transition"
          />
          <p class="text-xs text-gray-400 mt-1">At least 3 characters</p>
        </div>

        <!-- Email -->
        <div>
          <label for="email" class="block text-sm font-medium text-gray-700 mb-1">
            Email Address
          </label>
          <input
            type="email"
            id="email"
            name="email"
            placeholder="you@example.com"
            required
            class="w-full px-4 py-2.5 border border-gray-300 rounded-lg text-sm
                   focus:outline-none focus:ring-2 focus:ring-indigo-400 focus:border-transparent
                   transition"
          />
        </div>

        <!-- Password -->
        <div>
          <label for="password" class="block text-sm font-medium text-gray-700 mb-1">
            Password
          </label>
          <input
            type="password"
            id="password"
            name="password"
            placeholder="At least 8 characters"
            required
            minlength="8"
            class="w-full px-4 py-2.5 border border-gray-300 rounded-lg text-sm
                   focus:outline-none focus:ring-2 focus:ring-indigo-400 focus:border-transparent
                   transition"
          />
        </div>

        <!-- Confirm Password -->
        <div>
          <label for="confirm_password" class="block text-sm font-medium text-gray-700 mb-1">
            Confirm Password
          </label>
          <input
            type="password"
            id="confirm_password"
            name="confirm_password"
            placeholder="Repeat your password"
            required
            minlength="8"
            class="w-full px-4 py-2.5 border border-gray-300 rounded-lg text-sm
                   focus:outline-none focus:ring-2 focus:ring-indigo-400 focus:border-transparent
                   transition"
          />
        </div>

        <!-- Submit -->
        <button
          type="submit"
          class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-semibold
                 py-2.5 rounded-lg text-sm transition duration-200"
        >
          Create Account
        </button>

      </form>

      <!-- Login Link -->
      <p class="text-center text-sm text-gray-500 mt-6">
        Already have an account?
        <a href="{{ url_for('auth.login') }}" class="text-indigo-600 hover:underline font-medium">
          Sign in
        </a>
      </p>

    </div>
  </div>

</body>
</html>
