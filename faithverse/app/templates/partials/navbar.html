<!-- partials/navbar.html -->

<header class="sticky top-0 z-30 bg-white/90 backdrop-blur-xl border-b border-violet-100 shadow-sm">

  <div class="h-16 px-4 sm:px-6 lg:px-8 flex items-center justify-between">

    <!-- LEFT -->
    <div class="flex items-center gap-4 min-w-0">

      <!-- MOBILE SIDEBAR BUTTON -->
      <button onclick="toggleSidebar()"
              class="lg:hidden inline-flex items-center justify-center w-11 h-11 rounded-2xl border border-violet-100 bg-violet-50 text-violet-700
                     hover:bg-violet-100 hover:scale-[1.03]
                     active:scale-95
                     transition-all duration-200">

        <svg xmlns="http://www.w3.org/2000/svg"
             class="w-5 h-5"
             fill="none"
             viewBox="0 0 24 24"
             stroke="currentColor"
             stroke-width="2">

          <path stroke-linecap="round"
                stroke-linejoin="round"
                d="M4 6h16M4 12h16M4 18h16" />

        </svg>

      </button>

      <!-- TITLE -->
      <div class="min-w-0">

        <h1 class="text-lg sm:text-xl font-black tracking-tight text-violet-950 truncate">

          {% block navbar_title %}
            Dashboard
          {% endblock %}

        </h1>

        <p class="hidden sm:block text-xs text-slate-500 mt-0.5">
          FaithVerse Admin Panel
        </p>

      </div>

    </div>

    <!-- RIGHT -->
    <div class="flex items-center gap-3 sm:gap-4">

      <!-- ROLE -->
      <div class="hidden sm:flex items-center gap-2 px-3 py-2 rounded-2xl bg-violet-50 border border-violet-100">

        <svg xmlns="http://www.w3.org/2000/svg"
             class="w-4 h-4 text-violet-700"
             fill="none"
             viewBox="0 0 24 24"
             stroke="currentColor"
             stroke-width="2">

          <path stroke-linecap="round"
                stroke-linejoin="round"
                d="M5.121 17.804A13.937 13.937 0 0112 16c2.5 0 4.847.655 6.879 1.804M15 10a3 3 0 11-6 0 3 3 0 016 0zm6 2a9 9 0 11-18 0 9 9 0 0118 0z" />

        </svg>

        <span class="text-xs font-bold uppercase tracking-wide text-violet-700">
          {{ current_user.role }}
        </span>

      </div>

      <!-- USER -->
      <div class="hidden sm:flex items-center gap-2 px-3 py-2 rounded-2xl bg-white border border-slate-200 shadow-sm">

        <svg xmlns="http://www.w3.org/2000/svg"
             class="w-4 h-4 text-slate-500"
             fill="none"
             viewBox="0 0 24 24"
             stroke="currentColor"
             stroke-width="2">

          <path stroke-linecap="round"
                stroke-linejoin="round"
                d="M5.121 17.804A13.937 13.937 0 0112 16c2.5 0 4.847.655 6.879 1.804M15 10a3 3 0 11-6 0 3 3 0 016 0zm6 2a9 9 0 11-18 0 9 9 0 0118 0z" />

        </svg>

        <span class="text-sm font-semibold text-slate-700 truncate max-w-[120px]">
          {{ current_user.username }}
        </span>

      </div>

      <!-- LOGOUT -->
      <a href="{{ url_for('auth.logout') }}"
         class="inline-flex items-center gap-2 px-4 py-2.5 rounded-2xl border border-red-200 bg-red-50 text-red-700 text-sm font-semibold
                hover:bg-red-100 hover:-translate-y-0.5
                active:scale-95
                transition-all duration-200 shadow-sm">

        <svg xmlns="http://www.w3.org/2000/svg"
             class="w-4 h-4"
             fill="none"
             viewBox="0 0 24 24"
             stroke="currentColor"
             stroke-width="2">

          <path stroke-linecap="round"
                stroke-linejoin="round"
                d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a2 2 0 01-2 2H6a2 2 0 01-2-2V7a2 2 0 012-2h5a2 2 0 012 2v1" />

        </svg>

        <span class="hidden sm:inline">
          Logout
        </span>

      </a>

    </div>

  </div>

</header>
