<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8" />

  <meta name="viewport"
        content="width=device-width, initial-scale=1.0" />

  <title>
    {% block title %}FaithVerse Admin{% endblock %} — FaithVerse
  </title>

  <script src="https://cdn.tailwindcss.com"></script>

  <meta name="csrf-token"
        content="{{ session.get('_csrf_token', '') }}" />

  <link rel="stylesheet"
        href="{{ url_for('static', filename='css/custom.css') }}" />

  <link rel="preconnect"
        href="https://fonts.googleapis.com">

  <link rel="preconnect"
        href="https://fonts.gstatic.com"
        crossorigin>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap"
        rel="stylesheet">

  <script>

    tailwind.config = {
      theme: {
        extend: {

          fontFamily: {
            sans: ['Inter', 'sans-serif']
          },

          colors: {

            primary: {
              50: '#f5f3ff',
              100: '#ede9fe',
              200: '#ddd6fe',
              300: '#c4b5fd',
              400: '#a78bfa',
              500: '#8b5cf6',
              600: '#7c3aed',
              700: '#6d28d9',
              800: '#5b21b6',
              900: '#4c1d95'
            }

          },

          boxShadow: {
            soft: '0 10px 35px rgba(124,58,237,0.10)'
          }

        }
      }
    }

  </script>

  <style>

    html,
    body {
      height: 100%;
      overflow-x: hidden;
    }

    ::-webkit-scrollbar {
      width: 8px;
    }

    ::-webkit-scrollbar-thumb {
      background: #c4b5fd;
      border-radius: 999px;
    }

    ::-webkit-scrollbar-track {
      background: transparent;
    }

  </style>

  {% block head %}{% endblock %}

</head>

<body class="bg-gradient-to-br from-violet-50 via-white to-violet-100 font-sans text-slate-900 antialiased">

  <div class="flex min-h-screen">

    <!-- SIDEBAR -->
    {% include 'partials/sidebar.html' %}

    <!-- MAIN WRAPPER -->
    <div class="flex-1 flex flex-col min-w-0">

      <!-- NAVBAR -->
      {% include 'partials/navbar.html' %}

      <!-- PAGE -->
      <main class="flex-1 overflow-y-auto px-4 sm:px-6 lg:px-8 py-5 lg:py-7">

        <!-- ALERTS -->
        {% include 'partials/alerts.html' %}

        <!-- HEADER -->
        <div id="page-header" class="mb-6">
          {% block page_header %}{% endblock %}
        </div>

        <!-- CONTENT -->
        <div id="page-content"
             class="space-y-6">

          {% block content %}{% endblock %}

        </div>

      </main>

    </div>

  </div>

  <!-- MOBILE OVERLAY -->
  <div id="sidebar-overlay"
       class="fixed inset-0 bg-black/40 backdrop-blur-sm z-20 hidden lg:hidden"
       onclick="toggleSidebar()">
  </div>

  <!-- JS -->
  <script src="{{ url_for('static', filename='js/sidebar.js') }}"></script>

  <script src="{{ url_for('static', filename='js/toast.js') }}"></script>

  <script src="{{ url_for('static', filename='js/modal.js') }}"></script>

  <script src="{{ url_for('static', filename='js/search.js') }}"></script>

  <script src="{{ url_for('static', filename='js/dashboard.js') }}"></script>

  <!-- GSAP -->
  <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>

  <script>

    gsap.fromTo(
      "#page-header",
      {
        opacity: 0,
        y: -18
      },
      {
        opacity: 1,
        y: 0,
        duration: 0.45,
        ease: "power2.out"
      }
    );

    gsap.fromTo(
      "#page-content",
      {
        opacity: 0,
        y: 16
      },
      {
        opacity: 1,
        y: 0,
        duration: 0.5,
        delay: 0.05,
        ease: "power2.out"
      }
    );

    document.querySelectorAll(
      ".bg-white"
    ).forEach(card => {

      card.addEventListener("mouseenter", () => {

        gsap.to(card, {
          y: -3,
          duration: 0.2,
          ease: "power2.out"
        });

      });

      card.addEventListener("mouseleave", () => {

        gsap.to(card, {
          y: 0,
          duration: 0.2,
          ease: "power2.out"
        });

      });

    });

  </script>

  {% block scripts %}{% endblock %}

</body>

</html>
