DOCTYPE ODOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<title>FaithVerse • Prayer Requests</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link
href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Nunito:wght@400;500;600;700&display=swap"
rel="stylesheet"
/>

<script>
tailwind.config = {
    darkMode: 'class'
}
</script>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>

</head>

<body class="min-h-screen bg-[#0d0d1a] text-[#ece9ff] font-['Nunito'] flex overflow-hidden">

<!-- SIDEBAR -->

<aside class="hidden lg:flex w-72 flex-col border-r border-white/10 bg-white/5 backdrop-blur-xl p-6">

<div class="mb-10">

<h1 class="font-['Playfair_Display'] text-4xl font-bold">
FaithVerse
</h1>

<p class="mt-2 text-sm text-slate-400">
Prayer Requests
</p>

</div>

<nav class="space-y-3">

<a
href="/admin/dashboard.html"
class="block rounded-2xl px-5 py-4 hover:bg-white/5 transition-all">

Dashboard

</a>

<a
href="/admin/users.html"
class="block rounded-2xl px-5 py-4 hover:bg-white/5 transition-all">

Users

</a>

<a
href="/admin/verses.html"
class="block rounded-2xl px-5 py-4 hover:bg-white/5 transition-all">

Verses

</a>

<a
href="/admin/prayers.html"
class="block rounded-2xl bg-violet-600 px-5 py-4 font-semibold">

Prayer Requests

</a>

<a
href="/admin/settings.html"
class="block rounded-2xl px-5 py-4 hover:bg-white/5 transition-all">

Settings

</a>

</nav>

<button
id="logoutBtn"
class="mt-auto rounded-2xl border border-red-500/20 bg-red-500/10 py-4 text-red-400 hover:bg-red-500/20 transition-all">

Logout

</button>

</aside>

<!-- MAIN -->

<main class="flex-1 overflow-y-auto p-6 lg:p-10">

<div class="mb-10 flex flex-col gap-6 lg:flex-row lg:items-center lg:justify-between">

<div>

<h2 class="text-5xl font-bold">
Prayer Requests
</h2>

<p class="mt-3 text-lg text-slate-400">
Moderate community prayers
</p>

</div>

<input
id="searchInput"
type="text"
placeholder="Search prayers..."
class="w-full lg:w-80 rounded-2xl border border-white/10 bg-white/5 px-5 py-4 outline-none backdrop-blur-xl placeholder:text-slate-500"
/>

</div>

<div
id="prayersContainer"
class="space-y-5">

</div>

</main>

<script type="module">

import { supabase } from '/src/js/supabase.js'

const prayersContainer =
    document.getElementById(
        'prayersContainer'
    )

const searchInput =
    document.getElementById(
        'searchInput'
    )

let allPrayers = []

async function checkAdmin() {

    const {
        data: { session }
    } = await supabase.auth.getSession()

    if (!session) {

        window.location.href =
            '/admin/login.html'
    }
}

async function loadPrayers() {

    const { data } =
        await supabase
            .from('prayer_requests')
            .select('*')
            .order('created_at', {
                ascending: false
            })

    allPrayers = data || []

    renderPrayers(allPrayers)
}

function renderPrayers(prayers) {

    prayersContainer.innerHTML = ''

    prayers.forEach((prayer) => {

        prayersContainer.innerHTML += `

        <div class="rounded-3xl border border-white/10 bg-white/5 p-6 backdrop-blur-xl">

            <div class="flex flex-col gap-6 lg:flex-row lg:items-start lg:justify-between">

                <div>

                    <div class="flex items-center gap-3 mb-3">

                        <h3 class="text-2xl font-bold">
                            ${prayer.name || 'Anonymous'}
                        </h3>

                        ${
                            prayer.is_answered
                            ? `
                            <span class="rounded-full border border-emerald-500/20 bg-emerald-500/10 px-3 py-1 text-sm text-emerald-400">
                                Answered
                            </span>
                            `
                            : ''
                        }

                    </div>

                    <p class="text-slate-400 leading-relaxed">
                        ${prayer.message}
                    </p>

                </div>

                <div class="flex gap-3">

                    <button
                    onclick="toggleAnswered(${prayer.id}, ${prayer.is_answered})"
                    class="rounded-xl border border-emerald-500/20 bg-emerald-500/10 px-4 py-2 text-emerald-400 hover:bg-emerald-500/20 transition-all">

                    ${
                        prayer.is_answered
                        ? 'Unmark'
                        : 'Mark Answered'
                    }

                    </button>

                    <button
                    onclick="deletePrayer(${prayer.id})"
                    class="rounded-xl border border-red-500/20 bg-red-500/10 px-4 py-2 text-red-400 hover:bg-red-500/20 transition-all">

                    Delete

                    </button>

                </div>

            </div>

        </div>

        `
    })

    gsap.from(
        '#prayersContainer > div',
        {
            opacity: 0,
            y: 20,
            stagger: 0.05,
            duration: 0.5
        }
    )
}

window.toggleAnswered =
async function(id, current) {

    await supabase
        .from('prayer_requests')
        .update({
            is_answered: !current
        })
        .eq('id', id)

    loadPrayers()
}

window.deletePrayer =
async function(id) {

    const confirmed =
        confirm('Delete prayer request?')

    if (!confirmed) return

    await supabase
        .from('prayer_requests')
        .delete()
        .eq('id', id)

    loadPrayers()
}

searchInput.addEventListener(
    'input',
    (e) => {

        const value =
            e.target.value.toLowerCase()

        const filtered =
            allPrayers.filter((prayer) => {

                return (
                    prayer.name?.toLowerCase().includes(value)
                    ||
                    prayer.message?.toLowerCase().includes(value)
                )
            })

        renderPrayers(filtered)
    }
)

document
    .getElementById('logoutBtn')
    .addEventListener(
        'click',
        async () => {

            await supabase.auth.signOut()

            window.location.href =
                '/admin/login.html'
        }
    )

await checkAdmin()

await loadPrayers()

</script>

</body>
  </html>
