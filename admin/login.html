<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8" />

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    />

    <title>
        FaithVerse Admin
    </title>

    <script src="https://cdn.tailwindcss.com"></script>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>

</head>

<body class="bg-[#0f172a] min-h-screen flex items-center justify-center px-6 text-white">

    <div
        id="loginCard"
        class="w-full max-w-md bg-[#111827] border border-white/10 rounded-3xl p-8 shadow-2xl"
    >

        <div class="text-center mb-8">

            <h1 class="text-4xl font-bold mb-2">
                FaithVerse
            </h1>

            <p class="text-gray-400">
                Admin Dashboard
            </p>

        </div>

        <form
            id="loginForm"
            class="space-y-5"
        >

            <div>

                <label class="block mb-2 text-sm text-gray-300">
                    Email
                </label>

                <input
                    id="email"
                    type="email"
                    required
                    placeholder="admin@faithverse.com"
                    class="w-full bg-[#1f2937] border border-white/10 rounded-xl px-4 py-3 outline-none focus:border-indigo-500 transition-all"
                />

            </div>

            <div>

                <label class="block mb-2 text-sm text-gray-300">
                    Password
                </label>

                <input
                    id="password"
                    type="password"
                    required
                    placeholder="••••••••"
                    class="w-full bg-[#1f2937] border border-white/10 rounded-xl px-4 py-3 outline-none focus:border-indigo-500 transition-all"
                />

            </div>

            <button
                type="submit"
                class="w-full bg-indigo-600 hover:bg-indigo-500 rounded-xl py-3 font-semibold transition-all"
            >
                Sign In
            </button>

        </form>

    </div>

    <script type="module"
        src="../src/js/auth.js">
    </script>

    <script>

        gsap.from(
            '#loginCard',
            {
                opacity: 0,
                y: 40,
                duration: 1,
                ease: 'power3.out'
            }
        )

    </script>

</body>

                  </html>
