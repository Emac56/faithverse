
<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<title>FaithVerse • Users</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link
href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Nunito:wght@400;500;600;700&display=swap"
rel="stylesheet"
/>

<script>
tailwind.config = {
    darkMode: 'class'
}
</script>

<script src="https://cdn.tailwindcss.com"></script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>

</head>

<body class="min-h-screen flex lg:overflow-hidden bg-[#0d0d1a] text-[#ece9ff] font-['Nunito']">

<!-- SIDEBAR -->

<aside class="hidden lg:flex w-72 flex-col border-r border-white/10 bg-white/5 backdrop-blur-xl p-6">

<div class="mb-10">

<h1 class="font-['Playfair_Display'] text-4xl font-bold">
FaithVerse
</h1>

<p class="mt-2 text-sm text-slate-400">
User Management
</p>

</div>

<nav class="space-y-3">

<a
href="dashboard.html"
class="block rounded-2xl px-5 py-4 transition-all hover:bg-white/5">

Dashboard

</a>

<a
href="users.html"
class="block rounded-2xl bg-violet-600 px-5 py-4 font-semibold transition-all hover:bg-violet-500">

Users

</a>

<a
href="verses.html"
class="block rounded-2xl px-5 py-4 transition-all hover:bg-white/5">

Verses

</a>

<a
href="prayers.html"
class="block rounded-2xl px-5 py-4 transition-all hover:bg-white/5">

Prayer Requests

</a>

<a
href="settings.html"
class="block rounded-2xl px-5 py-4 transition-all hover:bg-white/5">

Settings

</a>

</nav>

<button
id="logoutBtn"
class="mt-auto rounded-2xl border border-red-500/20 bg-red-500/10 py-4 text-red-400 transition-all hover:bg-red-500/20">

Logout

</button>

</aside>

<!-- MAIN -->

<main class="flex-1 lg:overflow-y-auto p-6 lg:p-10">

<div class="mb-10 flex flex-col gap-6 lg:flex-row lg:items-center lg:justify-between">

<div>

<h2 class="text-5xl font-bold">
Users
</h2>

<p class="mt-3 text-lg text-slate-400">
Manage FaithVerse users
</p>

</div>

<input
id="searchInput"
type="text"
placeholder="Search users..."
class="w-full lg:w-80 rounded-2xl border border-white/10 bg-white/5 px-5 py-4 outline-none backdrop-blur-xl placeholder:text-slate-500"
/>

</div>

<!-- TABLE -->

<div class="overflow-hidden rounded-3xl border border-white/10 bg-white/5 backdrop-blur-xl">

<div class="overflow-x-auto">

<table class="w-full">

<thead class="border-b border-white/10 bg-black/10">

<tr>

<th class="px-6 py-5 text-left text-sm font-semibold text-slate-300">
Email
</th>

<th class="px-6 py-5 text-left text-sm font-semibold text-slate-300">
Name
</th>

<th class="px-6 py-5 text-left text-sm font-semibold text-slate-300">
Status
</th>

<th class="px-6 py-5 text-left text-sm font-semibold text-slate-300">
Created
</th>

<th class="px-6 py-5 text-right text-sm font-semibold text-slate-300">
Actions
</th>

</tr>

</thead>

<tbody
id="usersTable"
class="divide-y divide-white/5">

</tbody>

</table>

</div>

</div>

</main>

<script type="module">

import { supabase } from '../src/js/supabase.js'

const usersTable =
    document.getElementById('usersTable')

const searchInput =
    document.getElementById('searchInput')

let allUsers = []

async function checkAdmin() {

    const {
        data: { session }
    } = await supabase.auth.getSession()

    if (!session) {

        window.location.href =
            'login.html'

        return
    }
}

async function loadUsers() {

    const { data, error } =
        await supabase
            .from('users')
            .select('*')
            .order('created_at', {
                ascending: false
            })

    if (error) {
        console.error(error)
        return
    }

    allUsers = data

    renderUsers(data)
}

function renderUsers(users) {

    usersTable.innerHTML = ''

    users.forEach((user) => {

        usersTable.innerHTML += `

        <tr class="hover:bg-white/[0.03] transition-all">

            <td class="px-6 py-5">
                ${user.email || 'No Email'}
            </td>

            <td class="px-6 py-5">
                ${user.full_name || 'Unknown'}
            </td>

            <td class="px-6 py-5">

                ${
                    user.is_banned
                    ? `
                    <span class="rounded-full border border-red-500/20 bg-red-500/10 px-3 py-1 text-sm text-red-400">
                        Banned
                    </span>
                    `
                    : `
                    <span class="rounded-full border border-emerald-500/20 bg-emerald-500/10 px-3 py-1 text-sm text-emerald-400">
                        Active
                    </span>
                    `
                }

            </td>

            <td class="px-6 py-5 text-slate-400">

                ${new Date(user.created_at).toLocaleDateString()}

            </td>

            <td class="px-6 py-5">

                <div class="flex justify-end gap-3">

                    <button
                    onclick="toggleBan('${user.id}', ${user.is_banned})"
                    class="rounded-xl border border-yellow-500/20 bg-yellow-500/10 px-4 py-2 text-yellow-400 transition-all hover:bg-yellow-500/20">

                    ${
                        user.is_banned
                        ? 'Unban'
                        : 'Ban'
                    }

                    </button>

                    <button
                    onclick="deleteUser('${user.id}')"
                    class="rounded-xl border border-red-500/20 bg-red-500/10 px-4 py-2 text-red-400 transition-all hover:bg-red-500/20">

                    Delete

                    </button>

                </div>

            </td>

        </tr>

        `
    })

    gsap.from(
        'tbody tr',
        {
            opacity: 0,
            y: 20,
            stagger: 0.05,
            duration: 0.5
        }
    )
}

window.toggleBan =
async function(id, currentStatus) {

    await supabase
        .from('users')
        .update({
            is_banned: !currentStatus
        })
        .eq('id', id)

    loadUsers()
}

window.deleteUser =
async function(id) {

    const confirmed =
        confirm('Delete this user?')

    if (!confirmed) return

    await supabase
        .from('users')
        .delete()
        .eq('id', id)

    loadUsers()
}

searchInput.addEventListener(
    'input',
    (e) => {

        const value =
            e.target.value.toLowerCase()

        const filtered =
            allUsers.filter((user) => {

                return (
                    user.email?.toLowerCase().includes(value)
                    ||
                    user.full_name?.toLowerCase().includes(value)
                )
            })

        renderUsers(filtered)
    }
)

document
    .getElementById('logoutBtn')
    .addEventListener(
        'click',
        async () => {

            await supabase.auth.signOut()

            window.location.href =
                'login.html'
        }
    )

await checkAdmin()

await loadUsers()

</script>

</body>
  </html>
