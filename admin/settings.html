

<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<title>FaithVerse • Settings</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link
href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Nunito:wght@400;500;600;700&display=swap"
rel="stylesheet"
/>

<script>
tailwind.config = {
    darkMode: 'class'
}
</script>

<script src="https://cdn.tailwindcss.com"></script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>

</head>

<body class="min-h-screen bg-[#0d0d1a] text-[#ece9ff] font-['Nunito'] flex lg:overflow-hidden">

<!-- SIDEBAR -->

<aside class="hidden lg:flex w-72 flex-col border-r border-white/10 bg-white/5 backdrop-blur-xl p-6">

<div class="mb-10">

<h1 class="font-['Playfair_Display'] text-4xl font-bold">
FaithVerse
</h1>

<p class="mt-2 text-sm text-slate-400">
Settings
</p>

</div>

<nav class="space-y-3">

<a
href="dashboard.html"
class="block rounded-2xl px-5 py-4 hover:bg-white/5 transition-all">

Dashboard

</a>

<a
href="users.html"
class="block rounded-2xl px-5 py-4 hover:bg-white/5 transition-all">

Users

</a>

<a
href="verses.html"
class="block rounded-2xl px-5 py-4 hover:bg-white/5 transition-all">

Verses

</a>

<a
href="prayers.html"
class="block rounded-2xl px-5 py-4 hover:bg-white/5 transition-all">

Prayer Requests

</a>

<a
href="settings.html"
class="block rounded-2xl bg-violet-600 px-5 py-4 font-semibold">

Settings

</a>

</nav>

<button
id="logoutBtn"
class="mt-auto rounded-2xl border border-red-500/20 bg-red-500/10 py-4 text-red-400 hover:bg-red-500/20 transition-all">

Logout

</button>

</aside>

<!-- MAIN -->

<main class="flex-1 lg:overflow-y-auto p-6 lg:p-10">

<div class="mb-10">

<h2 class="text-5xl font-bold">
Settings
</h2>

<p class="mt-3 text-lg text-slate-400">
Manage FaithVerse settings
</p>

</div>

<div class="grid gap-6">

<!-- SITE SETTINGS -->

<div class="rounded-3xl border border-white/10 bg-white/5 p-8 backdrop-blur-xl">

<h3 class="mb-6 text-2xl font-bold">
Site Settings
</h3>

<form
id="settingsForm"
class="space-y-5">

<div>

<label class="mb-2 block text-slate-400">
Site Title
</label>

<input
id="siteTitle"
type="text"
class="w-full rounded-2xl border border-white/10 bg-white/5 px-5 py-4 outline-none"
/>

</div>

<div>

<label class="mb-2 block text-slate-400">
Theme
</label>

<select
id="theme"
class="w-full rounded-2xl border border-white/10 bg-[#181828] px-5 py-4 outline-none">

<option value="dark">
Dark
</option>

<option value="light">
Light
</option>

</select>

</div>

<button
type="submit"
class="rounded-2xl bg-violet-600 px-6 py-4 font-semibold hover:bg-violet-500 transition-all">

Save Settings

</button>

</form>

</div>

<!-- CATEGORIES -->

<div class="rounded-3xl border border-white/10 bg-white/5 p-8 backdrop-blur-xl">

<div class="mb-6 flex items-center justify-between">

<h3 class="text-2xl font-bold">
Verse Categories
</h3>

<button
id="addCategoryBtn"
class="rounded-2xl bg-violet-600 px-5 py-3 hover:bg-violet-500 transition-all">

Add Category

</button>

</div>

<div
id="categoriesContainer"
class="space-y-3">

</div>

</div>

</div>

</main>

<script type="module">

import { supabase } from '../src/js/supabase.js'

const settingsForm =
    document.getElementById(
        'settingsForm'
    )

const siteTitle =
    document.getElementById(
        'siteTitle'
    )

const theme =
    document.getElementById(
        'theme'
    )

const categoriesContainer =
    document.getElementById(
        'categoriesContainer'
    )

const addCategoryBtn =
    document.getElementById(
        'addCategoryBtn'
    )

async function checkAdmin() {

    const {
        data: { session }
    } = await supabase.auth.getSession()

    if (!session) {

        window.location.href =
            'login.html'
    }
}

async function loadSettings() {

    const { data } =
        await supabase
            .from('settings')
            .select('*')
            .limit(1)
            .single()

    if (!data) return

    siteTitle.value =
        data.site_title

    theme.value =
        data.theme
}

settingsForm.addEventListener(
    'submit',
    async (e) => {

        e.preventDefault()

        const { data } =
            await supabase
                .from('settings')
                .select('*')
                .limit(1)

        if (data.length > 0) {

            await supabase
                .from('settings')
                .update({
                    site_title:
                        siteTitle.value,

                    theme:
                        theme.value
                })
                .eq(
                    'id',
                    data[0].id
                )

        } else {

            await supabase
                .from('settings')
                .insert({
                    site_title:
                        siteTitle.value,

                    theme:
                        theme.value
                })
        }

        alert('Settings Saved')
    }
)

async function loadCategories() {

    const { data } =
        await supabase
            .from('categories')
            .select('*')
            .order('created_at', {
                ascending: false
            })

    categoriesContainer.innerHTML = ''

    data?.forEach((category) => {

        categoriesContainer.innerHTML += `

        <div class="flex items-center justify-between rounded-2xl border border-white/10 bg-black/10 px-5 py-4">

            <p>
                ${category.name}
            </p>

            <button
            onclick="deleteCategory(${category.id})"
            class="rounded-xl border border-red-500/20 bg-red-500/10 px-4 py-2 text-red-400 hover:bg-red-500/20 transition-all">

            Delete

            </button>

        </div>

        `
    })

    gsap.from(
        '#categoriesContainer > div',
        {
            opacity: 0,
            y: 15,
            stagger: 0.05,
            duration: 0.4
        }
    )
}

addCategoryBtn.addEventListener(
    'click',
    async () => {

        const name =
            prompt(
                'Category name'
            )

        if (!name) return

        await supabase
            .from('categories')
            .insert({
                name
            })

        loadCategories()
    }
)

window.deleteCategory =
async function(id) {

    const confirmed =
        confirm('Delete category?')

    if (!confirmed) return

    await supabase
        .from('categories')
        .delete()
        .eq('id', id)

    loadCategories()
}

document
    .getElementById('logoutBtn')
    .addEventListener(
        'click',
        async () => {

            await supabase.auth.signOut()

            window.location.href =
                'login.html'
        }
    )

await checkAdmin()

await loadSettings()

await loadCategories()

</script>

</body>
  </html>
